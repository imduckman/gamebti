<!doctype html>
<html lang=ko>

  <head>
    <meta charset=UTF-8>
    <meta name=viewport content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1">
    <meta http-equiv=X-UA-Compatible content="ie=edge">
    <meta http-equiv=Content-Security-Policy content=upgrade-insecure-requests>

    <title>GBTI 인생 게임 추천 - 결과</title>
    <link rel="icon" href="./assets/images/logo.png" type="image/png">
    
    <link rel=stylesheet href=https://unpkg.com/swiper/swiper-bundle.min.css>
    <link rel=stylesheet href=https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css integrity=sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2 crossorigin=anonymous>
    <link rel=stylesheet href=https://pro.fontawesome.com/releases/v5.10.0/css/all.css integrity=sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p crossorigin=anonymous>
    <link rel=stylesheet href=./assets/css/style.css>
    
    <style>
      .similar-games-container {
        background: linear-gradient(135deg, rgba(30, 30, 30, 0.95), rgba(40, 40, 40, 0.95));
        padding: 30px 20px;
        border-radius: 20px;
        margin: 20px 0;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        border: 2px solid rgba(255, 255, 255, 0.1);
      }
      
      .similar-game-card {
        background: #1a1a1a;
        padding: 25px;
        border-radius: 15px;
        text-align: center;
        transition: all 0.3s ease;
        border: 2px solid;
        position: relative;
        min-height: 140px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        box-shadow: -3px -3px 8px rgba(255, 255, 255, 0.05),
                    3px 3px 10px rgba(0, 0, 0, 0.5);
      }
      
      .similar-game-card:hover {
        transform: translateY(-5px);
        box-shadow: -5px -5px 15px rgba(255, 255, 255, 0.1),
                    5px 5px 20px rgba(0, 0, 0, 0.7);
      }
      
      .game-number {
        position: absolute;
        top: -10px;
        left: -10px;
        width: 35px;
        height: 35px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: white;
        font-size: 16px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.3);
      }
      
      .similar-game-card h5 {
        font-size: 1.2rem;
        font-weight: bold;
        margin: 10px 0;
      }
      
      .game-search-link a {
        text-decoration: none;
        font-size: 0.9rem;
        transition: all 0.3s ease;
      }
      
      .game-search-link a:hover {
        text-decoration: underline;
        opacity: 0.8;
      }
      
      .close-similar-btn {
        background: #2a2a2a;
        border: 2px solid #444;
        color: white;
        padding: 10px 30px;
        border-radius: 25px;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 1rem;
      }
      
      .close-similar-btn:hover {
        background: #3a3a3a;
        border-color: #666;
        transform: scale(1.05);
      }
      
      .similar-games-toggle-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        padding: 15px 40px;
        border-radius: 30px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }
      
      .similar-games-toggle-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(102, 126, 234, 0.6);
      }
      
      .similar-games-toggle-btn:active {
        transform: translateY(-1px);
      }
    </style>
    
    <script src=https://code.jquery.com/jquery-3.5.0.js></script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-J01BJ2N7EK"></script>
    <script>function gtag(){dataLayer.push(arguments)}window.dataLayer=window.dataLayer||[],gtag("js",new Date),gtag("config","G-J01BJ2N7EK")</script>
    <script data-ad-client=ca-pub-6017561848628392 async src=https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js></script>
  </head>
  

  <body>
    <div id="header"></div>

    <article class=result>
      <div class=se-pre-con>
        <div class=loader-area>
          <svg>
            <rect></rect>
          </svg>
        </div>
      </div>
      <div class="mt-5 mb-5 result-info" style="display:none;">
        <div class=result-img>
          <img id=img src="" alt=game>
        </div>

        <div class="result-title mt-5 mb-4">
          <h1 id=game class=text-center></h1>
        </div>
        <br>

        <div class="result-explain mt-3">
          <h3 id=explain class="text-left mt-3">당신은 <span id=desc></span> (<span id=mbti-type></span>)
            입니다! <br> <br>
            <span id=genre1></span> <span id=genre></span> <br>
            <span id=game-rec1></span> <span id=game-rec></span> <br><br>
            <span id=explain1></span> <br><br>

            <p class=comment> <i class="fas fa-info-circle" style=color:#87cefa></i> 참고사항<br>
              본 테스트 결과는 데이터를 토대로 대략적인 성향을 유추하였으며, 재미로만 즐겨주세요!
              <br><br>
            </p>
          </h3>

          
          <div class="addthis_inline_share_toolbox mt-4 mb-4"></div>
          
          <!-- 비슷한 게임 보기 섹션 -->
          <div id="similar-games-section" class="similar-games-container" style="display: none;">
            <h4 class="text-center mb-4" style="color: white;">
              <i class="fas fa-gamepad"></i> 이런 게임도 추천드려요!
            </h4>
            <div id="similar-games-list" class="row">
              <!-- JavaScript로 동적 생성 -->
            </div>
            <div class="text-center mt-3">
              <button type="button" class="close-similar-btn" onclick="toggleSimilarGames()">
                <i class="fas fa-times"></i> 닫기
              </button>
            </div>
          </div>
          
          <!-- 비슷한 게임 보기 버튼 (배너 위) -->
          <div class="text-center mb-4 mt-2">
            <button type="button" class="similar-games-toggle-btn" onclick="toggleSimilarGames()">
              <i class="fas fa-gamepad"></i> 비슷한 게임 찾아보기
            </button>
          </div>
          
          <div class="mb-5 text-center">
            <a href="https://forms.gle/uTeMGnWeDmZfRC9y6" target="_blank">
              <img src="./assets/images/end.png" alt="모집 포스터" class="poster-img">
            </a>
          </div>
          <div class=result-buttons>
            <div class="mt-3 mb-3 retry-button">
              <button type=button class=retrytest onclick="location.href='./all-results.html'">다른 유형들 보기</button>
            </div>
            <div class="mt-3 mb-5 retry-button">
              <button type=button class=retrytest onclick=gaReload()>다시하기</button>
            </div>
          </div>
        </div>
      </div>

    </article>
    
    <div id="footer"></div>



   <script>
  $(document).ready(function() {
    const THEMES = {
        'ANALYST': { types: ['INTJ', 'INTP', 'ENTJ', 'ENTP'], color: '#ff3b7f' },
        'DIPLOMAT': { types: ['INFJ', 'INFP', 'ENFJ', 'ENFP'], color: '#92ff4f' },
        'MANAGER': { types: ['ISTJ', 'ISFJ', 'ESTJ', 'ESFJ'], color: '#70bfff' },
        'EXPLORER': { types: ['ISTP', 'ISFP', 'ESTP', 'ESFP'], color: '#ffeb3b' }
    };

    const mbti = localStorage.getItem("mbti");
    const dataStr = localStorage.getItem("resultData");

    if (dataStr) {
      const data = JSON.parse(dataStr);
      let themeColor = '#ffffff';
      for (const key in THEMES) {
          if (THEMES[key].types.includes(mbti)) themeColor = THEMES[key].color;
      }

      // UI 업데이트
      $("#game, #desc, #genre1, #game-rec1, #other-game1").css("color", themeColor);
      $("#game").text(data.game);
      $("#desc").text(data.desc);
      $("#mbti-type").text(data["mbti-type"]);
      $("#genre").text(data.genre);
      $("#game-rec1").text(data["game-rec1"]);
      $("#game-rec").text(data["game-rec"]);
      $("#explain1").html(data.explain1);
      $("#img").attr("src", data.img);

      // 하이라이트 색상 지연 적용 (DOM 로드 후)
      setTimeout(() => { $(".highlight").css("color", themeColor); }, 100);
      $(".se-pre-con").fadeOut(1000, () => { $(".result-info").fadeIn(500); });
      
      // 비슷한 게임 목록 준비
      window.similarGamesData = {
        games: data["game-rec"] ? data["game-rec"].split(", ") : [],
        themeColor: themeColor
      };
    }
  });
  
  // 비슷한 게임 보기 토글 함수
  function toggleSimilarGames() {
    const section = $("#similar-games-section");
    const gamesList = $("#similar-games-list");
    
    if (section.is(":visible")) {
      section.slideUp(400);
    } else {
      // 게임 목록이 비어있으면 생성
      if (gamesList.children().length === 0 && window.similarGamesData) {
        // 중복 제거 및 빈 값 제거
        const allGames = window.similarGamesData.games.map(g => g.trim()).filter(g => g.length > 0);
        const games = [...new Set(allGames)]; // Set으로 중복 제거
        const color = window.similarGamesData.themeColor;
        
        if (games.length > 0) {
          games.forEach((game, index) => {
            const gameCard = `
              <div class="col-md-6 col-lg-4 mb-3">
                <div class="similar-game-card" style="border-color: ${color};">
                  <div class="game-number" style="background: ${color};">${index + 1}</div>
                  <h5 style="color: ${color};">${game}</h5>
                  <p class="game-search-link">
                    <a href="https://www.google.com/search?q=${encodeURIComponent(game + ' 게임')}" 
                       target="_blank" style="color: ${color};">
                      <i class="fas fa-search"></i> 검색하기
                    </a>
                  </p>
                </div>
              </div>
            `;
            gamesList.append(gameCard);
          });
        } else {
          gamesList.html('<div class="col-12 text-center"><p style="color: #999;">추천 게임 정보가 없습니다.</p></div>');
        }
      }
      
      section.slideDown(400);
      // 섹션으로 스크롤
      $('html, body').animate({
        scrollTop: section.offset().top - 100
      }, 500);
    }
  }
</script>

<script>
  $(function() {
    $("#header").load("./components/header.html");
    $("#footer").load("./components/footer.html");
  });
</script>
  </body>
</html>
